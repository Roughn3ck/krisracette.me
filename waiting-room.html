<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting — Kris Racette</title>
    <link rel="canonical" href="https://krisracette.me/waiting-room">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Establishing a secure connection to Kris Racette's profile.">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }
        .pulse-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #22c55e;
            margin: 0 auto 2rem;
            animation: pulse 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pulse-ring .inner {
            width: 20px;
            height: 20px;
            background: #22c55e;
            border-radius: 50%;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.75rem;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .access-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .access-form input {
            background: #1a1a2e;
            border: 1px solid #334155;
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 0.05em;
            outline: none;
            transition: border-color 0.3s;
        }
        .access-form input:focus {
            border-color: #22c55e;
        }
        .access-form input::placeholder {
            color: #475569;
            letter-spacing: 0.05em;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            display: none;
        }
        .back-link {
            margin-top: 2rem;
        }
        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s;
        }
        .back-link a:hover {
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pulse-ring">
            <div class="inner"></div>
        </div>
        <h1>Establishing Connection</h1>
        <p>This channel requires direct verification.<br>Please enter your access code to continue.</p>
        <div class="access-form">
            <input type="text" id="access-code" placeholder="ACCESS CODE" autocomplete="off">
            <div class="error-msg" id="error-msg">Invalid access code. Please try again.</div>
        </div>
        <div class="back-link">
            <a href="/">← Return to profile</a>
        </div>
    </div>
    <script>
        const CORRECT_CODE = 'em-connect-2026';
        const input = document.getElementById('access-code');
        const error = document.getElementById('error-msg');
        
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (input.value.trim().toLowerCase() === CORRECT_CODE) {
                    window.location.href = 'https://executivemind.io/kris-racette-bio';
                } else {
                    error.style.display = 'block';
                    input.value = '';
                    input.style.borderColor = '#ef4444';
                    setTimeout(() => { input.style.borderColor = '#334155'; }, 2000);
                }
            }
        });
    </script>
</body>
</html>
